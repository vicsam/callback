name: Daily digest

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch: {}

jobs:
  call-daily-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily-digest Edge Function
        run: |
          status=$(curl -s -o response.json -w "%{http_code}" -X POST \
            "${{ secrets.DAILY_DIGEST_URL }}" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          echo "HTTP status: $status"
          cat response.json
          if [ "$status" -ge 300 ]; then
            echo "daily-digest returned a non-2xx status"
            exit 1
          fi
